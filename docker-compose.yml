services:
  postgres:
    image: postgres:15-alpine
    container_name: difyflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: difyflow
      POSTGRES_PASSWORD: password
      POSTGRES_DB: difyflow
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U difyflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
